<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>地图挑战</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Lato:wght@300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
  <script src="https://unpkg.com/leaflet-providers@latest/leaflet-providers.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Turf.js/6.5.0/turf.min.js"></script>
  <script src="countries.js"></script>
</head>
<body>
  <div id="prompt" style="
      position: absolute;
      top: 20px; left: 50%;
      transform: translateX(-50%);
      background: rgba(255,255,255,0.96);
      padding: 14px 32px;
      font-family: 'Lato', sans-serif;
      font-size: 30px;
      font-weight: 600;
      letter-spacing: 0.01em;
      border-radius: 6px;
      z-index: 1000;
      box-shadow: 0 4px 20px rgba(0,0,0,0.18);
      white-space: nowrap;
  ">—</div>

  <div id="scorecard" style="
    position: absolute; top: 20px; right: 20px;
    background: rgba(255,255,255,0.96);
    border-radius: 6px; z-index: 1000;
    box-shadow: 0 2px 12px rgba(0,0,0,0.1);
    padding: 8px 14px;
    display: flex; flex-direction: column; gap: 4px;
    min-width: 110px;
    font-family: 'Lato', sans-serif; font-size: 11px;
  ">
    <div style="
      font-family: 'Lato', sans-serif;
      font-size: 10px; font-weight: 600;
      letter-spacing: 0.1em; text-transform: uppercase;
      color: #aaa; border-bottom: 1px solid rgba(0,0,0,0.08);
      padding-bottom: 5px; margin-bottom: 1px;
    ">Scorecard</div>
    <div style="display: flex; justify-content: space-between; color: #777;">
      <span>Correct</span><span id="sc-correct" style="font-weight: 700; color: #333;">0</span>
    </div>
    <div style="display: flex; justify-content: space-between; color: #777;">
      <span>Wrong</span><span id="sc-wrong" style="font-weight: 700; color: #333;">0</span>
    </div>
    <div style="display: flex; justify-content: space-between; color: #777;">
      <span>Skipped</span><span id="sc-skipped" style="font-weight: 700; color: #333;">0</span>
    </div>
  </div>

    <!-- Back and Skip buttons -->
  <div style="
    position: absolute; bottom: 30px; left: 50%;
    transform: translateX(-50%);
    display: flex; gap: 12px; z-index: 1000;
  ">
    <button id="btn-back" onclick="goBack()" style="
      padding: 11px 22px; font-size: 14px;
      font-family: 'Lato', sans-serif;
      background: rgba(255,255,255,0.96); border: 1.5px solid #bbb;
      border-radius: 6px; cursor: pointer;
      box-shadow: 0 3px 12px rgba(0,0,0,0.15);
    " onmouseover="this.style.background='#f0f0f0'" onmouseout="this.style.background='rgba(255,255,255,0.96)'">← Back</button>
    <button id="btn-clue-1" onclick="clue1()" style="
      padding: 11px 22px; font-size: 14px;
      font-family: 'Lato', sans-serif;
      background: rgba(255,255,255,0.96); border: 1.5px solid #bbb;
      border-radius: 6px; cursor: pointer;
      box-shadow: 0 3px 12px rgba(0,0,0,0.15);
    " onmouseover="this.style.background='#f0f0f0'" onmouseout="this.style.background='rgba(255,255,255,0.96)'">Clue 1</button>
    <button id="btn-clue-2" onclick="clue2()" disabled style="
      padding: 11px 22px; font-size: 14px;
      font-family: 'Lato', sans-serif;
      background: rgba(255,255,255,0.96); border: 1.5px solid #bbb;
      border-radius: 6px; cursor: not-allowed; opacity: 0.35;
      box-shadow: 0 3px 12px rgba(0,0,0,0.15);
    " onmouseover="if(!this.disabled) this.style.background='#f0f0f0'" onmouseout="if(!this.disabled) this.style.background='rgba(255,255,255,0.96)'">Clue 2</button>
    <button id="btn-skip" onclick="goSkip()" style="
      padding: 11px 22px; font-size: 14px;
      font-family: 'Lato', sans-serif;
      background: rgba(255,255,255,0.96); border: 1.5px solid #bbb;
      border-radius: 6px; cursor: pointer;
      box-shadow: 0 3px 12px rgba(0,0,0,0.15);
    " onmouseover="this.style.background='#f0f0f0'" onmouseout="this.style.background='rgba(255,255,255,0.96)'">Skip →</button>
    <button id="btn-labels" onclick="toggleLabels()" style="
      padding: 11px 22px; font-size: 14px;
      font-family: 'Lato', sans-serif;
      background: rgba(255,255,255,0.96); border: 1.5px solid #bbb;
      border-radius: 6px; cursor: pointer;
      box-shadow: 0 3px 12px rgba(0,0,0,0.15);
    " onmouseover="this.style.background='#f0f0f0'" onmouseout="this.style.background='rgba(255,255,255,0.96)'">Show Labels</button>
  </div>

  <div id="map" style="width:100vw; height:100vh;"></div>
  <script>

    let current = COUNTRIES[Math.floor(Math.random() * COUNTRIES.length)];
    document.getElementById('prompt').textContent = current.cn;
    let geoData;

    //game logic
    let roundIndex = 0;
    const ROUNDS = COUNTRIES.length;
    let usedCountries = shuffle(COUNTRIES).slice(0, ROUNDS);
    let answered = false;
    let countryNames = false;
    let guessesLeft = 3;

    // Score
    let scoreCorrect = 0;
    let scoreWrong   = 0;
    let scoreSkipped = 0;

    const tilesWithLabels = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap contributors',
      noWrap: true,
    });

    const map = L.map('map', {
        center: [20, 0],
        zoom: 3,
        minZoom: 3,
        maxBounds: [[-90, -180], [90, 180]],
        maxBoundsViscosity: 1.0,
      });

    var Stadia_StamenWatercolor = L.tileLayer('https://tiles.stadiamaps.com/tiles/stamen_watercolor/{z}/{x}/{y}.{ext}', {
      minZoom: 1,
      maxZoom: 16,
      attribution: '&copy; <a href="https://www.stadiamaps.com/" target="_blank">Stadia Maps</a> &copy; <a href="https://www.stamen.com/" target="_blank">Stamen Design</a> &copy; <a href="https://openmaptiles.org/" target="_blank">OpenMapTiles</a> &copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
      ext: 'jpg'
    });
    Stadia_StamenWatercolor.addTo(map);

    let labelsVisible = false;
    //L.tileLayer.provider('Stadia.StamenWatercolor').addTo(map);

    var Stadia_StamenTerrainLines = L.tileLayer('https://tiles.stadiamaps.com/tiles/stamen_terrain_lines/{z}/{x}/{y}{r}.{ext}', {
      minZoom: 0,
      maxZoom: 18,
      attribution: '&copy; <a href="https://www.stadiamaps.com/" target="_blank">Stadia Maps</a> &copy; <a href="https://www.stamen.com/" target="_blank">Stamen Design</a> &copy; <a href="https://openmaptiles.org/" target="_blank">OpenMapTiles</a> &copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
      ext: 'png'
    });
    Stadia_StamenTerrainLines.addTo(map);

    var Stadia_StamenTerrainLabels = L.tileLayer('https://tiles.stadiamaps.com/tiles/stamen_terrain_labels/{z}/{x}/{y}{r}.{ext}', {
      minZoom: 0,
      maxZoom: 18,
      attribution: '&copy; <a href="https://www.stadiamaps.com/" target="_blank">Stadia Maps</a> &copy; <a href="https://www.stamen.com/" target="_blank">Stamen Design</a> &copy; <a href="https://openmaptiles.org/" target="_blank">OpenMapTiles</a> &copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
      ext: 'png'
    });

    const markerLayer = L.layerGroup();
   
    function loadRound() {
      markerLayer.clearLayers();
      guessesLeft = 3;
      current = usedCountries[roundIndex];
      document.getElementById('prompt').textContent = `${current.cn}, ${guessesLeft} guesses left`;
      // Disable back button on first round
      document.getElementById('btn-back').disabled = (roundIndex === 0);
      document.getElementById('btn-back').style.opacity = (roundIndex === 0) ? '0.4' : '1'; 
      // Disable clue 2
      document.getElementById('btn-clue-2').disabled = true;
      document.getElementById('btn-clue-2').style.opacity = '0.4';
      document.getElementById('btn-clue-2').style.cursor = 'not-allowed';
      map.flyTo([20, 0], 3, { duration: 1.0 });
    }

    function shuffle(arr) {
      return [...arr].sort(() => Math.random() - 0.5);
    }

    function updateScore() {
      document.getElementById('sc-correct').textContent = scoreCorrect;
      document.getElementById('sc-wrong').textContent   = scoreWrong;
      document.getElementById('sc-skipped').textContent = scoreSkipped;
    }

    function revealAnswer() {
      const feature = geoData.features.find(f => f.properties['ISO_A3'] === current.iso);
    
      if (feature) {
        const layer = L.geoJSON(feature, {
          /*
          style: {
            color: '#ff0000',
            weight: 3,
            fillColor: '#ff0000',
            fillOpacity: 0.3,
          }*/
        }).addTo(markerLayer);

        // pan and zoom to fit the country
        map.fitBounds(layer.getBounds(), { padding: [40, 40] });
      }
    } 

    function goBack() {
      if (roundIndex <= 0) return;
      roundIndex--;
      loadRound();
    }

    function goSkip() {
      if (!answered) {
        scoreSkipped++;
        updateScore();
      }
      answered = false;
      roundIndex++;
      if (roundIndex >= ROUNDS) {
        roundIndex = 0;
        usedCountries = shuffle(COUNTRIES).slice(0, ROUNDS);
      }
      loadRound();
    }

    function clue1() {
      console.log('Clue 1 activated');
      document.getElementById('prompt').textContent = `${current.cn} (${current.py}), ${guessesLeft} guesses left`;
      const btn = document.getElementById('btn-clue-2');
      btn.disabled = false;
      btn.style.opacity = '1';
      btn.style.cursor = 'pointer';
    }

    function clue2() {
      document.getElementById('prompt').textContent = `${current.cn} (${current.py}), continent: ${current.continent}, ${guessesLeft} guesses left`;
    }

    function toggleLabels() {
      if (!labelsVisible) {
        Stadia_StamenTerrainLabels.addTo(map);
        document.getElementById('btn-labels').textContent = 'Hide Labels';
      } else {
        map.removeLayer(Stadia_StamenTerrainLabels);
        document.getElementById('btn-labels').textContent = 'Show Labels';
      }
      labelsVisible = !labelsVisible;
    }

    async function init() {
      //const response = await fetch('https://raw.githubusercontent.com/nvkelso/natural-earth-vector/master/geojson/ne_110m_admin_0_countries.geojson');
      const response = await fetch('https://raw.githubusercontent.com/nvkelso/natural-earth-vector/master/geojson/ne_50m_admin_0_countries.geojson');
      geoData = await response.json();

      markerLayer.addTo(map);

      loadRound();

      map.on('click', function(e) {

        if (answered) {
            // second click — advance to next round
            answered = false;
            roundIndex++;
            if (roundIndex >= ROUNDS) {
              roundIndex = 0;
              usedCountries = shuffle(COUNTRIES).slice(0, ROUNDS);
            }
            loadRound();
            return;
        }
        const { lat, lng } = e.latlng;

        L.marker([lat, lng]).addTo(markerLayer); // player's guess
    
        const clickedPoint = turf.point([e.latlng.lng, e.latlng.lat]); // note: Turf uses [lng, lat]
        const match = geoData.features.find(feature =>
          turf.booleanPointInPolygon(clickedPoint, feature)
        );
        //console.log(match);

        if (match) {
          console.log('Clicked country:', match.properties.NAME_EN); // e.g. "France"
          const clickedIso = match.properties['ISO_A3_EH'];

          if (clickedIso === current.iso) {
            // Correct country!
            scoreCorrect++;
            updateScore();
            document.getElementById('prompt').textContent = `✓ ${current.cn} ${current.py} = ${current.en} ...Click to continue`;
            revealAnswer();
            answered = true;
          }
          else {
            // Wrong country
            guessesLeft--;
            if (guessesLeft > 0) {
              document.getElementById('prompt').textContent = `${current.cn}, ${guessesLeft} guesses left`;

            } 
            else {
              scoreWrong++;
              updateScore();
              revealAnswer();
              document.getElementById('prompt').textContent = `✗ ${current.cn} ${current.py} = ${current.en} ...Click to continue`;
              answered = true;
            }
            }
        
        }
        else {
          guessesLeft--;
          if (guessesLeft > 0) {
              document.getElementById('prompt').textContent = `${current.cn}, ${guessesLeft} guesses left`;
          } 
          else {
            scoreWrong++;
            updateScore();
            revealAnswer();
            document.getElementById('prompt').textContent = `✗ ${current.cn} = ${current.en} ...Click to continue`;
            answered = true;
          }
        }
      
      });
    }

    init();
  </script>
</body>
</html>

html, body {
  margin: 0;
  padding: 0;
  overflow: hidden;
}
