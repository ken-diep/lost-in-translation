<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>地图挑战</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Lato:wght@300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
  <script src="https://unpkg.com/leaflet-providers@latest/leaflet-providers.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Turf.js/6.5.0/turf.min.js"></script>
  <script src="countries.js"></script>
</head>
<body>
  <div id="prompt">—</div>

  <div id="scorecard">
    <div class="sc-label">Scorecard</div>
    <div class="sc-row"><span>Correct</span><span id="sc-correct">0</span></div>
    <div class="sc-row"><span>Wrong</span><span id="sc-wrong">0</span></div>
    <div class="sc-row"><span>Skipped</span><span id="sc-skipped">0</span></div>
  </div>

  <div id="btn-bar">
    <button id="btn-back"    class="btn" onclick="goBack()">← Back</button>
    <button id="btn-clue-1"  class="btn" onclick="clue1()">Clue 1</button>
    <button id="btn-clue-2"  class="btn" onclick="clue2()" disabled>Clue 2</button>
    <button id="btn-skip"    class="btn" onclick="goSkip()">Skip →</button>
    <button id="btn-labels"  class="btn" onclick="toggleLabels()">Show Labels</button>
  </div>

  <div id="map"></div>

  <script>
    //game logic
    let roundIndex = 0;
    const ROUNDS = COUNTRIES.length;
    let usedCountries = shuffle(COUNTRIES).slice(0, ROUNDS);
    let answered = false;
    let countryNames = false;
    let guessesLeft = 3;
    let clue1Used = false;
    let clue2Used = false;
    let current = COUNTRIES[Math.floor(Math.random() * COUNTRIES.length)];
    document.getElementById('prompt').textContent = current.cn;
    let geoData;
    let labelsVisible = false;

    // Score
    let scoreCorrect = 0;
    let scoreWrong   = 0;
    let scoreSkipped = 0;

/*     const tilesWithLabels = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap contributors',
      noWrap: true,
    }); */

    const map = L.map('map', {
        center: [20, 0],
        zoom: 3,
        minZoom: 3,
        maxBounds: [[-90, -180], [90, 180]],
        maxBoundsViscosity: 1.0,
        tap: true,
      });

    const Stadia_StamenWatercolor = L.tileLayer('https://tiles.stadiamaps.com/tiles/stamen_watercolor/{z}/{x}/{y}.{ext}', {
      minZoom: 1,
      maxZoom: 16,
      attribution: '&copy; <a href="https://www.stadiamaps.com/" target="_blank">Stadia Maps</a> &copy; <a href="https://www.stamen.com/" target="_blank">Stamen Design</a> &copy; <a href="https://openmaptiles.org/" target="_blank">OpenMapTiles</a> &copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
      ext: 'jpg'
    });
    Stadia_StamenWatercolor.addTo(map);

    const Stadia_StamenTerrainLines = L.tileLayer('https://tiles.stadiamaps.com/tiles/stamen_terrain_lines/{z}/{x}/{y}{r}.{ext}', {
      minZoom: 0,
      maxZoom: 18,
      attribution: '&copy; <a href="https://www.stadiamaps.com/" target="_blank">Stadia Maps</a> &copy; <a href="https://www.stamen.com/" target="_blank">Stamen Design</a> &copy; <a href="https://openmaptiles.org/" target="_blank">OpenMapTiles</a> &copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
      ext: 'png'
    });
    Stadia_StamenTerrainLines.addTo(map);

    const Stadia_StamenTerrainLabels = L.tileLayer('https://tiles.stadiamaps.com/tiles/stamen_terrain_labels/{z}/{x}/{y}{r}.{ext}', {
      minZoom: 0,
      maxZoom: 18,
      attribution: '&copy; <a href="https://www.stadiamaps.com/" target="_blank">Stadia Maps</a> &copy; <a href="https://www.stamen.com/" target="_blank">Stamen Design</a> &copy; <a href="https://openmaptiles.org/" target="_blank">OpenMapTiles</a> &copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
      ext: 'png'
    });

    const markerLayer = L.layerGroup();
   
    function loadRound() {
      markerLayer.clearLayers();
      repositionScorecard();
      clue1Used = false;
      clue2Used = false;
      guessesLeft = 3;
      current = usedCountries[roundIndex];

      document.getElementById('prompt').textContent = `${current.cn}, ${guessesLeft} guesses left`;
      // Disable back button on first round
      document.getElementById('btn-back').disabled = (roundIndex === 0);
      document.getElementById('btn-back').style.opacity = (roundIndex === 0) ? '0.4' : '1'; 
      // Disable clue 2
      document.getElementById('btn-clue-2').disabled = true;
      document.getElementById('btn-clue-2').style.opacity = '0.4';
      document.getElementById('btn-clue-2').style.cursor = 'not-allowed';
      map.flyTo([20, 0], 3, { duration: 1.0 });
    }

    function shuffle(arr) {
      return [...arr].sort(() => Math.random() - 0.5);
    }

    function updateScore() {
      document.getElementById('sc-correct').textContent = scoreCorrect;
      document.getElementById('sc-wrong').textContent   = scoreWrong;
      document.getElementById('sc-skipped').textContent = scoreSkipped;
    }

    function revealAnswer() {
      const feature = geoData.features.find(f => f.properties['ISO_A3'] === current.iso);
    
      if (feature) {
        const layer = L.geoJSON(feature).addTo(markerLayer);

        // pan and zoom to fit the country
        map.fitBounds(layer.getBounds(), { padding: [40, 40] });
      }
    } 

    function goBack() {
      if (roundIndex <= 0) return;
      roundIndex--;
      loadRound();
    }

    function goSkip() {
      if (!answered) {
        scoreSkipped++;
        updateScore();
      }
      answered = false;
      roundIndex++;
      if (roundIndex >= ROUNDS) {
        roundIndex = 0;
        usedCountries = shuffle(COUNTRIES).slice(0, ROUNDS);
      }
      loadRound();
    }

    function clue1() {
      console.log('Clue 1 activated');
      document.getElementById('prompt').textContent = `${current.cn} (${current.py}), ${guessesLeft} guesses left`;
      const btn = document.getElementById('btn-clue-2');
      btn.disabled = false;
      btn.style.opacity = '1';
      btn.style.cursor = 'pointer';
      clue1Used = true;
    }

    function clue2() {
      document.getElementById('prompt').textContent = `${current.cn} (${current.py}), continent: ${current.continent}, ${guessesLeft} guesses left`;
      clue2Used = true;
    }

    function toggleLabels() {
      if (!labelsVisible) {
        Stadia_StamenTerrainLabels.addTo(map);
        document.getElementById('btn-labels').textContent = 'Hide Labels';
      } else {
        map.removeLayer(Stadia_StamenTerrainLabels);
        document.getElementById('btn-labels').textContent = 'Show Labels';
      }
      labelsVisible = !labelsVisible;
    }

    async function init() {
      //const response = await fetch('https://raw.githubusercontent.com/nvkelso/natural-earth-vector/master/geojson/ne_110m_admin_0_countries.geojson');
      const response = await fetch('https://raw.githubusercontent.com/nvkelso/natural-earth-vector/master/geojson/ne_50m_admin_0_countries.geojson');
      geoData = await response.json();

      markerLayer.addTo(map);

      loadRound();

      map.on('click', function(e) {

        if (answered) {
            // second click — advance to next round
            answered = false;
            roundIndex++;
            if (roundIndex >= ROUNDS) {
              roundIndex = 0;
              usedCountries = shuffle(COUNTRIES).slice(0, ROUNDS);
            }
            loadRound();
            return;
        }
        const { lat, lng } = e.latlng;

        L.marker([lat, lng]).addTo(markerLayer); // player's guess
    
        const clickedPoint = turf.point([e.latlng.lng, e.latlng.lat]); // note: Turf uses [lng, lat]
        const match = geoData.features.find(feature =>
          turf.booleanPointInPolygon(clickedPoint, feature)
        );
        //console.log(match);

        if (match) {
          console.log('Clicked country:', match.properties.NAME_EN); // e.g. "France"
          const clickedIso = match.properties['ISO_A3_EH'];

          if (clickedIso === current.iso) {
            // Correct country!
            scoreCorrect++;
            updateScore();
            document.getElementById('prompt').textContent = `✓ ${current.cn} ${current.py} = ${current.en} ...Click to continue`;
            revealAnswer();
            answered = true;
          }
          else {
            // Wrong country
            guessesLeft--;
            if (guessesLeft > 0) {
              if (clue2Used) {
                clue2();
              }
              else {
                if (clue1Used) {
                  clue1();
                }
                else {
                  //No clue used
                  document.getElementById('prompt').textContent = `${current.cn}, ${guessesLeft} guesses left`;
                }
              }
            } 
            else {
              scoreWrong++;
              updateScore();
              revealAnswer();
              document.getElementById('prompt').textContent = `✗ ${current.cn} ${current.py} = ${current.en} ...Click to continue`;
              answered = true;
            }
            }
        
        }
        else {
          guessesLeft--;
          if (guessesLeft > 0) {
              if (clue2Used) {
                clue2();
              }
              else {
                if (clue1Used) {
                  clue1();
                }
                else {
                  //No clue used
                  document.getElementById('prompt').textContent = `${current.cn}, ${guessesLeft} guesses left`;
                }
              }
          } 
          else {
            scoreWrong++;
            updateScore();
            revealAnswer();
            document.getElementById('prompt').textContent = `✗ ${current.cn} = ${current.en} ...Click to continue`;
            answered = true;
          }
        }
      
      });
    }

    // ── Scorecard clash detection ─────────────────────────
    // We measure once per round (or on resize), never mid-round,
    // to avoid the scorecard jumping on every prompt update.
    let scorecardIsBottom = false;

    function repositionScorecard() {
      const prompt    = document.getElementById('prompt');
      const scorecard = document.getElementById('scorecard');

      // Temporarily remove bottom-right so we can measure the natural top-right position
      const wasBottom = scorecardIsBottom;
      scorecard.classList.remove('bottom-right');
      scorecard.style.bottom = '';

      requestAnimationFrame(() => {
        const pRect = prompt.getBoundingClientRect();
        const sRect = scorecard.getBoundingClientRect();

        const clash =
          pRect.right  > sRect.left  - 8 &&
          pRect.left   < sRect.right + 8 &&
          pRect.bottom > sRect.top   - 8 &&
          pRect.top    < sRect.bottom + 8;

        if (clash) {
          const btnBar = document.getElementById('btn-bar');
          const btnH   = btnBar ? btnBar.getBoundingClientRect().height : 60;
          // Extra 24px clearance above the button bar
          scorecard.style.bottom = (btnH + 24) + 'px';
          scorecard.classList.add('bottom-right');
          scorecardIsBottom = true;
        } else {
          scorecardIsBottom = false;
        }
      });
    }
    window.addEventListener("resize", repositionScorecard);
    init();
  </script>
</body>
</html>

html, body {
  margin: 0;
  padding: 0;
  overflow: hidden;
}
